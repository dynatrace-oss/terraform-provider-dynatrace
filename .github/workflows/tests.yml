  collect-e2e-results:
    name: Collect Failed Test Results
    if: ${{ always() }} # always run so failures are collected even when test jobs fail
    needs: [ unit-tests, integration-tests ]
#    needs: [ unit-tests, integration-tests, sequential-integration-tests ]
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Check out code into the Go module directory
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: 🛠️ Set up Go 1.x
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # 7.0.0
        with:
          go-version-file: ./go.mod

      - name: ⬇️ Download all test result artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          pattern: junit-results-*
          path: junit-results
          merge-multiple: true

      - name: 🧮 Collect failed tests
        run: go run ./tools/testresults --input junit-results --out-junit failed-tests.xml --out-list failed-tests.txt

      - name: ⬆️ Archive failed test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        if: always()
        with:
          name: failed-tests
          path: |
            failed-tests.xml
            failed-tests.txt

  sonar_scan:
    name: SonarQube lint and test coverage
    if: ${{ always() }} # always runs after lint and test have completed, regardless of whether they were successful
    needs: [ unit-tests, lint ]
    permissions:
      contents: read
      checks: write
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Check out code into the Go module directory
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          # Disabling shallow clones is recommended for improving the relevancy of reporting
          fetch-depth: 0

      - name: ⬇️ Download coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          name: code-coverage-report

      - name: ⬇️ Download lint artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          name: lint-report

      - name: 🏷️ Get latest tag
        id: get_latest_tag
        run: |
          echo "GIT_TAG=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"

      - name: 🔍 SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # nosemgrep false detection of commit v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            "-Dsonar.projectVersion=${{steps.get_latest_tag.outputs.GIT_TAG}}"
