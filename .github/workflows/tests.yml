name: Tests

# This workflow
#  - runs the unit tests and create coverage report
#  - runs static code analysis (linting)
#  - runs integration tests in parallel chunks
#  - reports the code coverage and linting errors to Sonar

on:
  push:
    branches:
      - '**'
jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Check out code into the Go module directory
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: 🛠️ Set up Go 1.x
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # 7.0.0
        with:
          go-version-file: ./go.mod

      - name: Run Unit Tests
        env:
          GOPROXY: "https://proxy.golang.org"
        run: |
          mkdir -p test-results/unit
          go tool gotestsum --junitfile test-results/unit/test-results.xml --format testdox --format-icons hivis -- -coverprofile=cov.out -tags=unit -v ./...

      - name: ⬆️ Archive unit test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        if: always()
        with:
          name: junit-results-unit
          path: test-results

      - name: ⬆️ Archive code coverage results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: code-coverage-report
          path: cov.out

  validate-schema-support:
    name: Validate Settings Schema Support
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Check out code into the Go module directory
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: 🛠️ Set up Go 1.x
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # 7.0.0
        with:
          go-version-file: ./go.mod

      - name: 🔎 Validate settings schemas are covered in supported-resources.md
        run: go run ./tools/schemasupport/

  lint:
    name: Run Static Code Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: ⬇️ Check out code into the Go module directory
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: 🛠️ Set up Go 1.x
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e #v7.0.0
        with:
          go-version-file: ./go.mod

      - name: 🧑‍🔧 Check for `go fix` changes
        run: |
          go fix -tags "unit integration" ./...
          git diff --exit-code
        if: always()

      - name: 🔎 golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a #v9.3.0
        if: always()
        with:
          install-mode: 'goinstall' # install mode goinstall in order to use hashes for the version
          version: eabc2638a66daf5bb6c6fb052a32fa3ef7b6600d #v2.1.6
          args: '--output.checkstyle.path=lint-report.xml --issues-exit-code=0' # if issues are found, don't exit with "1". Sonar decides if it fails or not

      - name: ⬆️ Archive lint results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        if: always()
        with:
          name: lint-report
          path: lint-report.xml

  run-setup:
    name: Run Integration Setup
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Check out code into the Go module directory
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: 🛠️ Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e #v4.0.1
        with:
          terraform_wrapper: false

      - name: 🚀 Integration Setup - Terraform Init
        working-directory: ./testsetup
        run: terraform init

      - name: 🚀 Integration Setup - Terraform Apply
        working-directory: ./testsetup
        env:
          TF_VAR_DYNATRACE_ENV_URL: ${{ secrets.DYNATRACE_ENV_URL }}
          TF_VAR_DYNATRACE_API_TOKEN: ${{ secrets.DYNATRACE_API_TOKEN }}
        run: terraform apply -auto-approve

  integration-tests:
    name: Integration Tests - ${{ matrix.config.name }}
    runs-on: ubuntu-latest
    needs: [ run-setup ]
    strategy:
      fail-fast: false
      matrix:
        # several tests are split into chunks with about 20 tests
        # A dynamic matrix can't be used because there is a limit of 256 entries
        config:
          - { name: "app", slug: "app", path: "./dynatrace/api/app/..." }
          - { name: "automation", slug: "automation", path: "./dynatrace/api/automation/..." }
          - { name: "cluster", slug: "cluster", path: "./dynatrace/api/cluster/..." }
          - { name: "documents", slug: "documents", path: "./dynatrace/api/documents/..." }
          - { name: "extensions", slug: "extensions", path: "./dynatrace/api/extensions/..." }
          - { name: "grail", slug: "grail", path: "./dynatrace/api/grail/..." }
          - { name: "iam", slug: "iam", path: "./dynatrace/api/iam/..." }
          - { name: "openpipeline", slug: "openpipeline", path: "./dynatrace/api/openpipeline/..." }
          - { name: "platform", slug: "platform", path: "./dynatrace/api/platform/..." }
          - { name: "service", slug: "service", path: "./dynatrace/api/service/..." }
          - { name: "slo", slug: "slo", path: "./dynatrace/api/slo/..." }
          - { name: "v1 (a-d)", slug: "v1-a-d", path: "$(go list ./dynatrace/api/v1/config/... | grep -E '^.+/dynatrace/api/v1/config/[a-d][^/]*/?')" }
#          - { name: "v1 (e-z)", slug: "v1-e-z", path: "$(go list ./dynatrace/api/v1/config/... | grep -E '^.+/dynatrace/api/v1/config/[e-z][^/]*/?')" }
          - { name: "v2", slug: "v2", path: "./dynatrace/api/v2/..." }
#          - { name: "builtin (a-b)", slug: "builtin-a-b", path: "$(go list ./dynatrace/api/builtin/... | grep -E '^.+/dynatrace/api/builtin/[a-b][^/]*/?')" }
          - { name: "builtin (c-e)", slug: "builtin-c-e", path: "$(go list ./dynatrace/api/builtin/... | grep -E '^.+/dynatrace/api/builtin/[c-e][^/]*/?')" }
#          - { name: "builtin (f-m)", slug: "builtin-f-m", path: "$(go list ./dynatrace/api/builtin/... | grep -E '^.+/dynatrace/api/builtin/[f-m][^/]*/?')" }
#          - { name: "builtin (n-o)", slug: "builtin-n-o", path: "$(go list ./dynatrace/api/builtin/... | grep -E '^.+/dynatrace/api/builtin/[n-o][^/]*/?')" }
#          - { name: "builtin (p-s)", slug: "builtin-p-s", path: "$(go list ./dynatrace/api/builtin/... | grep -E '^.+/dynatrace/api/builtin/[p-s][^/]*/?')" }
          - { name: "builtin (t-z)", slug: "builtin-t-z", path: "$(go list ./dynatrace/api/builtin/... | grep -E '^.+/dynatrace/api/builtin/[t-z][^/]*/?')" }
          - { name: "data sources", slug: "data-sources", path: "./datasources/..." }
    steps:
      - name: ⬇️ Check out code into the Go module directory
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: 🛠️ Set up Go 1.x
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # 7.0.0
        with:
          go-version-file: ./go.mod

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e #v4.0.1
        with:
          terraform_wrapper: false

      - name: Run Integration Tests - ${{ matrix.config.name }}
        if: success() || failure()
        env:
          GOPROXY: "https://proxy.golang.org"
          TF_ACC: "true"
          DYNATRACE_DEBUG: "true"
          DYNATRACE_HTTP_OAUTH_PREFERENCE: "true"
          DT_NO_REPAIR_INPUT: "false"
          DYNATRACE_ENV_URL: ${{ secrets.DYNATRACE_ENV_URL }}
          DYNATRACE_API_TOKEN: ${{ secrets.DYNATRACE_API_TOKEN }}
          DT_CLIENT_ID: ${{ secrets.DT_CLIENT_ID }}
          DT_CLIENT_SECRET: ${{ secrets.DT_CLIENT_SECRET }}
          DT_ACCOUNT_ID: ${{ secrets.DT_ACCOUNT_ID }}
          TF_VAR_DT_GCP_TEST_UNIMPERSONABLE_SERVICE_ACCOUNT: ${{ secrets.DT_GCP_TEST_UNIMPERSONABLE_SERVICE_ACCOUNT }}
          TF_VAR_DT_GCP_TEST_IMPERSONABLE_SERVICE_ACCOUNT: ${{ secrets.DT_GCP_TEST_IMPERSONABLE_SERVICE_ACCOUNT }}
        run: |
          mkdir -p test-results/${{ matrix.config.slug }}
          go tool gotestsum --junitfile test-results/${{ matrix.config.slug }}/test-results.xml --format testdox --format-icons hivis -- -tags="integration monitored connector" -v -p 1 ${{ matrix.config.path }}

      - name: ⬆️ Archive e2e test results - ${{ matrix.config.name }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        if: always()
        with:
          name: junit-results-${{ matrix.config.slug }}
          path: test-results

  sequential-integration-tests:
    name: Sequential Integration Tests
    runs-on: ubuntu-latest
    needs: [ run-setup ]
#    concurrency:
#      group: sequential-integration-tests # only one run at a time, globally
#      cancel-in-progress: false # queue, don't cancel
    steps:
      - name: ⬇️ Check out code into the Go module directory
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

#      - name: 🛠️ Set up Go 1.x
